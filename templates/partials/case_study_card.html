<article class="case-study-card card-lift animate-on-scroll" data-slug="{{ case.slug }}" style="--i: {{ loop.index0 if loop is defined else 0 }};">
    <div class="case-study-card__accent" aria-hidden="true"></div>
    <div class="case-study-card__inner">
        <div class="case-study-card__header">
            {% if case.client %}
            <span class="meta-tag meta-tag--client">{{ case.client }}</span>
            {% endif %}
            {% if show_badges|default(false) %}
            <div class="case-study-card__badges">
                {% if case.service %}
                <span class="meta-tag meta-tag--muted">{{ case.service.title }}</span>
                {% endif %}
                {% if case.featured %}
                <span class="meta-tag meta-tag--accent">Featured</span>
                {% endif %}
            </div>
            {% endif %}
        </div>
        <h3 class="case-study-card__title">{{ case.title }}</h3>
        <p class="case-study-card__excerpt">{{ case.summary|striptags|truncate(120) }}</p>
        <a href="{{ url_for('main.case_study_detail', slug=case.slug) }}" class="link-arrow">Read more</a>
    </div>
</article>
